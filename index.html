<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>URL Shortener</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

</head>

<body class="bg-light">

    <div class="container mt-5">

        <div class="card shadow p-5">

            <h1 class="text-center mb-4">
                URL Shortener Application
            </h1>

            <form method="POST">

                <div class="mb-3">

                    <input
                        type="text"
                        name="long_url"
                        class="form-control"
                        placeholder="Enter your long URL"
                        required
                    >

                </div>

                <div class="d-grid">

                    <button
                        type="submit"
                        class="btn btn-primary"
                    >
                        Shorten URL
                    </button>

                </div>

            </form>

            {% if short_url %}

            <div class="alert alert-success mt-4">

                <h5>Short URL Generated:</h5>

                <div class="d-flex gap-2">

                    <input
                        type="text"
                        value="{{ short_url }}"
                        id="shortUrl"
                        class="form-control"
                        readonly
                    >

                    <button
                        class="btn btn-success"
                        onclick="copyURL()"
                    >
                        Copy
                    </button>

                </div>

            </div>

            {% endif %}

            <hr class="mt-5">

            <h3 class="mb-3">
                URL History
            </h3>

            <table class="table table-bordered">

                <thead class="table-dark">

                    <tr>

                        <th>ID</th>
                        <th>Original URL</th>
                        <th>Short Code</th>

                    </tr>

                </thead>

                <tbody>

                    {% for url in all_urls %}

                    <tr>

                        <td>{{ url[0] }}</td>

                        <td>{{ url[1] }}</td>

                        <td>

                            <a
                                href="http://127.0.0.1:5000/{{ url[2] }}"
                                target="_blank"
                            >
                                {{ url[2] }}
                            </a>

                        </td>

                    </tr>

                    {% endfor %}

                </tbody>

            </table>

        </div>

    </div>

    <script>

        function copyURL() {

            var copyText = document.getElementById("shortUrl");

            copyText.select();

            copyText.setSelectionRange(0, 99999);

            navigator.clipboard.writeText(copyText.value);

            alert("URL Copied!");

        }

    </script>

</body>

</html>
